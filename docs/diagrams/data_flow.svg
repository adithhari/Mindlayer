  <path d="M500 778 C500 820 145 820 145 800" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a4)"/>
  <text class="ts" x="320" y="816" text-anchor="middle">Memory loop: next session starts with updated user card</text>

  <rect x="40" y="860" width="600" height="90" rx="12" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="6 3"/>
  <text class="th" x="340" y="884" text-anchor="middle">Therapist finder flow (separate path)</text>
  <text class="ts" x="340" y="906" text-anchor="middle">User enters city + state on Find Help screen</text>
  <text class="ts" x="340" y="924" text-anchor="middle">Frontend calls /api/therapists/search (proxied to NPPES NPI Registry — free)</text>
