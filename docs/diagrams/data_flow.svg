  <text class="th-teal" x="145" y="746" text-anchor="middle" dominant-baseline="central">/api/memory/add</text>
  <text class="ts-teal" x="145" y="766" text-anchor="middle" dominant-baseline="central">Save to Supermemory</text>
  <rect class="gray-box" x="260" y="728" width="140" height="50" rx="8"/>
  <text class="th-gray" x="330" y="746" text-anchor="middle" dominant-baseline="central">localStorage</text>
  <text class="ts-gray" x="330" y="766" text-anchor="middle" dominant-baseline="central">Mood, journal</text>
