<svg width="680" viewBox="0 0 680 1080" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff;">
  <style>
    .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    .ts { font-size: 12px; fill: #666; }
    .p { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
    .t { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .c { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .gy { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .tp { font-size: 14px; font-weight: 500; fill: #3C3489; }
    .sp { font-size: 12px; fill: #534AB7; }
    .tt { font-size: 14px; font-weight: 500; fill: #085041; }
    .st { font-size: 12px; fill: #0F6E56; }
    .tc { font-size: 14px; font-weight: 500; fill: #712B13; }
    .sc { font-size: 12px; fill: #993C1D; }
    .tg { font-size: 14px; font-weight: 500; fill: #444441; }
    .arr { stroke: #888; stroke-width: 1.5; }
    line.arr { marker-end: url(#a); }
    .sep { stroke: #ddd; stroke-width: 1; }
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <text class="th" x="340" y="24" text-anchor="middle">Supermemory data flow — complete lifecycle</text>

  <text class="ts" x="56" y="56">Phase 1: Load on login</text>
  <line x1="40" y1="46" x2="640" y2="46" class="sep"/>

  <rect class="gy" x="210" y="66" width="260" height="44" rx="8"/>
  <text class="tg" x="340" y="92" text-anchor="middle" dominant-baseline="central">User logs in (Firebase auth)</text>
  <line x1="340" y1="110" x2="340" y2="142" class="arr"/>

  <rect class="p" x="130" y="142" width="420" height="50" rx="8"/>
  <text class="tp" x="340" y="160" text-anchor="middle" dominant-baseline="central">AppContext.jsx — useEffect on userProfile</text>
  <text class="sp" x="340" y="180" text-anchor="middle" dominant-baseline="central">Fires once after onboarding completes</text>
  <line x1="340" y1="192" x2="340" y2="218" class="arr"/>

  <rect class="t" x="130" y="218" width="420" height="50" rx="8"/>
  <text class="tt" x="340" y="236" text-anchor="middle" dominant-baseline="central">loadUserProfile(userId)</text>
  <text class="st" x="340" y="256" text-anchor="middle" dominant-baseline="central">POST /api/memory/search — broad identity query</text>
  <line x1="340" y1="268" x2="340" y2="294" class="arr"/>

  <rect class="c" x="130" y="294" width="420" height="50" rx="8"/>
  <text class="tc" x="340" y="312" text-anchor="middle" dominant-baseline="central">Supermemory returns profile</text>
  <text class="sc" x="340" y="332" text-anchor="middle" dominant-baseline="central">Static facts + dynamic facts + past entries</text>
  <line x1="340" y1="344" x2="340" y2="370" class="arr"/>

  <rect class="p" x="130" y="370" width="420" height="50" rx="8"/>
  <text class="tp" x="340" y="388" text-anchor="middle" dominant-baseline="central">buildUserCard(profile)</text>
  <text class="sp" x="340" y="408" text-anchor="middle" dominant-baseline="central">Compresses to ~100 tokens, stored in React state</text>

  <line x1="340" y1="420" x2="340" y2="456" class="arr"/>

  <text class="ts" x="56" y="452">Phase 2: Inject into Claude (every interaction)</text>
  <line x1="40" y1="442" x2="640" y2="442" class="sep"/>

  <rect class="gy" x="150" y="466" width="380" height="44" rx="8"/>
  <text class="tg" x="340" y="492" text-anchor="middle" dominant-baseline="central">User submits text or voice dump</text>
  <line x1="340" y1="510" x2="340" y2="536" class="arr"/>

  <rect class="p" x="70" y="536" width="540" height="50" rx="8"/>
  <text class="tp" x="340" y="554" text-anchor="middle" dominant-baseline="central">analyzeEntry(text, name, mood, themes, userMemoryCard)</text>
  <text class="sp" x="340" y="574" text-anchor="middle" dominant-baseline="central">Card injected as USER MEMORY block in system prompt</text>
  <line x1="340" y1="586" x2="340" y2="612" class="arr"/>

  <rect class="t" x="130" y="612" width="420" height="50" rx="8"/>
  <text class="tt" x="340" y="630" text-anchor="middle" dominant-baseline="central">Claude reads memory + responds</text>
  <text class="st" x="340" y="650" text-anchor="middle" dominant-baseline="central">"I notice this keeps coming up..." (personalized)</text>

  <line x1="340" y1="662" x2="340" y2="698" class="arr"/>

  <text class="ts" x="56" y="694">Phase 3: Save after interaction (fire-and-forget)</text>
  <line x1="40" y1="684" x2="640" y2="684" class="sep"/>

  <rect class="p" x="55" y="710" width="270" height="50" rx="8"/>
  <text class="tp" x="190" y="728" text-anchor="middle" dominant-baseline="central">formatEntryForMemory()</text>
  <text class="sp" x="190" y="748" text-anchor="middle" dominant-baseline="central">Structured: mood, theme, stress</text>
  <rect class="p" x="345" y="710" width="280" height="50" rx="8"/>
  <text class="tp" x="485" y="728" text-anchor="middle" dominant-baseline="central">saveConversationMemory()</text>
  <text class="sp" x="485" y="748" text-anchor="middle" dominant-baseline="central">Voice transcript summary</text>

  <line x1="190" y1="760" x2="190" y2="790" class="arr"/>
  <line x1="485" y1="760" x2="485" y2="790" class="arr"/>

  <rect class="t" x="90" y="790" width="500" height="50" rx="8"/>
  <text class="tt" x="340" y="808" text-anchor="middle" dominant-baseline="central">POST /api/memory/add — proxied to Supermemory</text>
  <text class="st" x="340" y="828" text-anchor="middle" dominant-baseline="central">containerTag: mindlayer_user_{uid} + metadata tags</text>

  <line x1="340" y1="840" x2="340" y2="876" class="arr"/>

  <text class="ts" x="56" y="872">Phase 4: Refresh user card (debounced 30s)</text>
  <line x1="40" y1="862" x2="640" y2="862" class="sep"/>

  <rect class="p" x="90" y="890" width="500" height="50" rx="8"/>
  <text class="tp" x="340" y="908" text-anchor="middle" dominant-baseline="central">refreshUserMemory()</text>
  <text class="sp" x="340" y="928" text-anchor="middle" dominant-baseline="central">Re-calls loadUserProfile + buildUserCard, updates state</text>

  <path d="M590 915 C646 915 646 395 590 395" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#a)"/>
  <text class="st" x="654" y="655" text-anchor="middle" dominant-baseline="central" transform="rotate(90 654 655)">Memory loop</text>

  <line x1="40" y1="960" x2="640" y2="960" class="sep"/>
  <text class="ts" x="56" y="982">Cross-session continuity</text>

  <rect class="c" x="60" y="998" width="560" height="44" rx="8"/>
  <text class="tc" x="340" y="1016" text-anchor="middle" dominant-baseline="central">Next login: Phase 1 loads all accumulated memories</text>
  <text class="sc" x="340" y="1034" text-anchor="middle" dominant-baseline="central">User card grows richer with every session</text>
</svg>