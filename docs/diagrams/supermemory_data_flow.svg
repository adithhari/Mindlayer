<svg width="680" viewBox="0 0 680 1060" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff;">
  <style>
    .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    .ts { font-size: 12px; fill: #666; }
    .purple-box { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
    .teal-box { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .coral-box { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .gray-box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .th-purple { font-size: 14px; font-weight: 500; fill: #3C3489; }
    .ts-purple { font-size: 12px; fill: #534AB7; }
    .th-teal { font-size: 14px; font-weight: 500; fill: #085041; }
    .ts-teal { font-size: 12px; fill: #0F6E56; }
    .th-coral { font-size: 14px; font-weight: 500; fill: #712B13; }
    .ts-coral { font-size: 12px; fill: #993C1D; }
    .th-gray { font-size: 14px; font-weight: 500; fill: #444441; }
    .ts-gray { font-size: 12px; fill: #5F5E5A; }
    .arr { stroke: #888; stroke-width: 1.5; }
    line.arr { marker-end: url(#a3); }
    .sep { stroke: #ccc; stroke-width: 1; }
  </style>
  <defs><marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <text class="th" x="340" y="24" text-anchor="middle">Supermemory data flow — complete lifecycle</text>

  <text class="ts" x="340" y="52" text-anchor="middle">Phase 1: Load on login</text>
  <rect class="gray-box" x="220" y="64" width="240" height="44" rx="8"/>
  <text class="th-gray" x="340" y="90" text-anchor="middle" dominant-baseline="central">User logs in (Firebase auth)</text>

  <line x1="340" y1="108" x2="340" y2="140" class="arr"/>

  <rect class="purple-box" x="160" y="140" width="360" height="50" rx="8"/>
  <text class="th-purple" x="340" y="158" text-anchor="middle" dominant-baseline="central">AppContext.jsx — useEffect</text>
  <text class="ts-purple" x="340" y="178" text-anchor="middle" dominant-baseline="central">Fires when userProfile is set after onboarding</text>

  <line x1="340" y1="190" x2="340" y2="222" class="arr"/>

  <rect class="teal-box" x="140" y="222" width="400" height="50" rx="8"/>
  <text class="th-teal" x="340" y="240" text-anchor="middle" dominant-baseline="central">loadUserProfile(userId)</text>
  <text class="ts-teal" x="340" y="260" text-anchor="middle" dominant-baseline="central">Calls /api/memory/search with broad identity query</text>

  <line x1="340" y1="272" x2="340" y2="304" class="arr"/>

  <rect class="coral-box" x="160" y="304" width="360" height="50" rx="8"/>
  <text class="th-coral" x="340" y="322" text-anchor="middle" dominant-baseline="central">Supermemory returns profile</text>
  <text class="ts-coral" x="340" y="342" text-anchor="middle" dominant-baseline="central">static facts + dynamic facts + search results</text>

  <line x1="340" y1="354" x2="340" y2="386" class="arr"/>

  <rect class="purple-box" x="140" y="386" width="400" height="50" rx="8"/>
  <text class="th-purple" x="340" y="404" text-anchor="middle" dominant-baseline="central">buildUserCard(profile)</text>
  <text class="ts-purple" x="340" y="424" text-anchor="middle" dominant-baseline="central">Compresses to ~100 tokens, stored in state</text>

  <line x1="340" y1="436" x2="340" y2="460" class="arr"/>
  <line x1="40" y1="454" x2="640" y2="454" class="sep"/>

  <text class="ts" x="340" y="478" text-anchor="middle">Phase 2: Inject into Claude (every interaction)</text>

  <rect class="gray-box" x="140" y="490" width="400" height="44" rx="8"/>
  <text class="th-gray" x="340" y="516" text-anchor="middle" dominant-baseline="central">User submits text or voice dump</text>

  <line x1="340" y1="534" x2="340" y2="562" class="arr"/>

  <rect class="purple-box" x="80" y="562" width="520" height="56" rx="8"/>
  <text class="th-purple" x="340" y="582" text-anchor="middle" dominant-baseline="central">analyzeEntry(text, name, mood, themes, userMemoryCard)</text>
  <text class="ts-purple" x="340" y="602" text-anchor="middle" dominant-baseline="central">User card injected as USER MEMORY block in system prompt</text>

  <line x1="340" y1="618" x2="340" y2="650" class="arr"/>

  <rect class="teal-box" x="140" y="650" width="400" height="56" rx="8"/>
  <text class="th-teal" x="340" y="668" text-anchor="middle" dominant-baseline="central">Claude reads memory + responds</text>
  <text class="ts-teal" x="340" y="690" text-anchor="middle" dominant-baseline="central">"I notice this keeps coming up..." (personalized)</text>

  <line x1="340" y1="706" x2="340" y2="730" class="arr"/>
  <line x1="40" y1="724" x2="640" y2="724" class="sep"/>

  <text class="ts" x="340" y="752" text-anchor="middle">Phase 3: Save after interaction (fire-and-forget)</text>

  <rect class="purple-box" x="60" y="764" width="270" height="56" rx="8"/>
  <text class="th-purple" x="195" y="784" text-anchor="middle" dominant-baseline="central">formatEntryForMemory()</text>
  <text class="ts-purple" x="195" y="804" text-anchor="middle" dominant-baseline="central">Structured: mood, theme, stress</text>
  <rect class="purple-box" x="350" y="764" width="280" height="56" rx="8"/>
  <text class="th-purple" x="490" y="784" text-anchor="middle" dominant-baseline="central">saveConversationMemory()</text>
  <text class="ts-purple" x="490" y="804" text-anchor="middle" dominant-baseline="central">Voice transcript summary</text>

  <line x1="195" y1="820" x2="195" y2="852" class="arr"/>
  <line x1="490" y1="820" x2="490" y2="852" class="arr"/>

  <rect class="teal-box" x="100" y="852" width="480" height="50" rx="8"/>
  <text class="th-teal" x="340" y="870" text-anchor="middle" dominant-baseline="central">/api/memory/add — proxied to Supermemory</text>
  <text class="ts-teal" x="340" y="890" text-anchor="middle" dominant-baseline="central">containerTag: mindlayer_user_{uid} + metadata</text>

  <line x1="340" y1="902" x2="340" y2="926" class="arr"/>
  <line x1="40" y1="920" x2="640" y2="920" class="sep"/>

  <text class="ts" x="340" y="950" text-anchor="middle">Phase 4: Refresh user card (debounced 30s)</text>

  <rect class="purple-box" x="100" y="962" width="480" height="50" rx="8"/>
  <text class="th-purple" x="340" y="980" text-anchor="middle" dominant-baseline="central">refreshUserMemory()</text>
  <text class="ts-purple" x="340" y="1000" text-anchor="middle" dominant-baseline="central">Re-calls loadUserProfile + buildUserCard, updates state</text>

  <path d="M580 987 C640 987 640 420 580 420" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#a3)"/>
  <text class="ts-teal" x="644" y="700" text-anchor="middle" dominant-baseline="central" transform="rotate(90 644 700)">Memory loop</text>

  <rect class="coral-box" x="60" y="1024" width="560" height="28" rx="8"/>
  <text class="ts-coral" x="340" y="1042" text-anchor="middle" dominant-baseline="central">Next login: Phase 1 loads accumulated memories from all past sessions</text>
</svg>