  <rect class="coral-inner" x="380" y="748" width="110" height="26" rx="13"/>
  <text class="ts-coral" x="435" y="765" text-anchor="middle" dominant-baseline="central">External APIs</text>
  <rect class="gray-inner" x="510" y="748" width="100" height="26" rx="13"/>
  <text class="ts-gray" x="560" y="765" text-anchor="middle" dominant-baseline="central">Persistence</text>
