<svg width="680" viewBox="0 0 680 880" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff;">
  <style>
    .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    .ts { font-size: 12px; font-weight: 400; fill: #666; }
    .purple-box { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
    .purple-inner { fill: #CECBF6; stroke: #534AB7; stroke-width: 0.5; }
    .teal-box { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .teal-inner { fill: #9FE1CB; stroke: #0F6E56; stroke-width: 0.5; }
    .coral-box { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .coral-inner { fill: #F5C4B3; stroke: #993C1D; stroke-width: 0.5; }
    .gray-box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .gray-inner { fill: #D3D1C7; stroke: #5F5E5A; stroke-width: 0.5; }
    .th-purple { font-size: 14px; font-weight: 500; fill: #3C3489; }
    .ts-purple { font-size: 12px; fill: #534AB7; }
    .th-teal { font-size: 14px; font-weight: 500; fill: #085041; }
    .ts-teal { font-size: 12px; fill: #0F6E56; }
    .th-coral { font-size: 14px; font-weight: 500; fill: #712B13; }
    .ts-coral { font-size: 12px; fill: #993C1D; }
    .th-gray { font-size: 14px; font-weight: 500; fill: #444441; }
    .ts-gray { font-size: 12px; fill: #5F5E5A; }
    .arr { stroke: #888; stroke-width: 1.5; }
    line.arr { marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="24" text-anchor="middle">MindLayer — complete system architecture</text>

  <rect class="purple-box" x="40" y="40" width="600" height="150" rx="16"/>
  <text class="th-purple" x="340" y="64" text-anchor="middle">Frontend — React 18 + Vite + Three.js</text>
  <rect class="purple-inner" x="60" y="80" width="88" height="40" rx="6"/>
  <text class="ts-purple" x="104" y="104" text-anchor="middle" dominant-baseline="central">Home</text>
  <rect class="purple-inner" x="158" y="80" width="88" height="40" rx="6"/>
  <text class="ts-purple" x="202" y="104" text-anchor="middle" dominant-baseline="central">3D orb</text>
  <rect class="purple-inner" x="256" y="80" width="88" height="40" rx="6"/>
  <text class="ts-purple" x="300" y="104" text-anchor="middle" dominant-baseline="central">Journal</text>
  <rect class="purple-inner" x="354" y="80" width="88" height="40" rx="6"/>
  <text class="ts-purple" x="398" y="104" text-anchor="middle" dominant-baseline="central">Tracker</text>
  <rect class="purple-inner" x="452" y="80" width="88" height="40" rx="6"/>
  <text class="ts-purple" x="496" y="104" text-anchor="middle" dominant-baseline="central">Find help</text>
  <rect class="purple-inner" x="550" y="80" width="78" height="40" rx="6"/>
  <text class="ts-purple" x="589" y="104" text-anchor="middle" dominant-baseline="central">Crisis</text>
  <rect class="purple-inner" x="60" y="132" width="110" height="36" rx="6"/>
  <text class="ts-purple" x="115" y="154" text-anchor="middle" dominant-baseline="central">Voice recorder</text>
  <rect class="purple-inner" x="182" y="132" width="110" height="36" rx="6"/>
  <text class="ts-purple" x="237" y="154" text-anchor="middle" dominant-baseline="central">Mood slider</text>
  <rect class="purple-inner" x="304" y="132" width="110" height="36" rx="6"/>
  <text class="ts-purple" x="359" y="154" text-anchor="middle" dominant-baseline="central">Onboarding</text>
  <rect class="purple-inner" x="426" y="132" width="100" height="36" rx="6"/>
  <text class="ts-purple" x="476" y="154" text-anchor="middle" dominant-baseline="central">Firebase auth</text>

  <text class="ts" x="340" y="210" text-anchor="middle">Vite proxy: /api/* requests</text>
  <line x1="340" y1="190" x2="340" y2="228" class="arr"/>

  <rect class="teal-box" x="40" y="236" width="600" height="194" rx="16"/>
  <text class="th-teal" x="340" y="260" text-anchor="middle">FastAPI backend proxy — keys server-side</text>
  <rect class="teal-inner" x="60" y="274" width="130" height="50" rx="6"/>
  <text class="th-teal" x="125" y="292" text-anchor="middle" dominant-baseline="central">/api/claude</text>
  <text class="ts-teal" x="125" y="312" text-anchor="middle" dominant-baseline="central">AI analysis</text>
  <rect class="teal-inner" x="200" y="274" width="130" height="50" rx="6"/>
  <text class="th-teal" x="265" y="292" text-anchor="middle" dominant-baseline="central">/api/hume/*</text>
  <text class="ts-teal" x="265" y="312" text-anchor="middle" dominant-baseline="central">Emotion detect</text>
  <rect class="teal-inner" x="340" y="274" width="140" height="50" rx="6"/>
  <text class="th-teal" x="410" y="292" text-anchor="middle" dominant-baseline="central">/api/deepgram/*</text>
  <text class="ts-teal" x="410" y="312" text-anchor="middle" dominant-baseline="central">STT + TTS</text>
  <rect class="teal-inner" x="490" y="274" width="140" height="50" rx="6"/>
  <text class="th-teal" x="560" y="292" text-anchor="middle" dominant-baseline="central">/api/memory/*</text>
  <text class="ts-teal" x="560" y="312" text-anchor="middle" dominant-baseline="central">Supermemory</text>
  <rect class="teal-inner" x="60" y="338" width="180" height="50" rx="6"/>
  <text class="th-teal" x="150" y="356" text-anchor="middle" dominant-baseline="central">/api/therapists/search</text>
  <text class="ts-teal" x="150" y="376" text-anchor="middle" dominant-baseline="central">NPPES provider lookup</text>
  <rect class="teal-inner" x="252" y="338" width="190" height="50" rx="6"/>
  <text class="th-teal" x="347" y="356" text-anchor="middle" dominant-baseline="central">/api/therapists/facilities</text>
  <text class="ts-teal" x="347" y="376" text-anchor="middle" dominant-baseline="central">SAMHSA locator</text>
  <rect class="teal-inner" x="454" y="338" width="176" height="50" rx="6"/>
  <text class="th-teal" x="542" y="356" text-anchor="middle" dominant-baseline="central">/api/crisis/resources</text>
  <text class="ts-teal" x="542" y="376" text-anchor="middle" dominant-baseline="central">Hardcoded, always on</text>
  <text class="ts" x="340" y="418" text-anchor="middle">6-hour in-memory cache for therapist results</text>

  <line x1="340" y1="430" x2="340" y2="470" class="arr"/>

  <rect class="coral-box" x="40" y="478" width="600" height="110" rx="16"/>
  <text class="th-coral" x="340" y="502" text-anchor="middle">External services (keys held by backend)</text>
  <rect class="coral-inner" x="60" y="516" width="100" height="40" rx="6"/>
  <text class="th-coral" x="110" y="540" text-anchor="middle" dominant-baseline="central">Claude API</text>
  <rect class="coral-inner" x="170" y="516" width="80" height="40" rx="6"/>
  <text class="th-coral" x="210" y="540" text-anchor="middle" dominant-baseline="central">Hume AI</text>
  <rect class="coral-inner" x="260" y="516" width="96" height="40" rx="6"/>
  <text class="th-coral" x="308" y="540" text-anchor="middle" dominant-baseline="central">Deepgram</text>
  <rect class="coral-inner" x="366" y="516" width="110" height="40" rx="6"/>
  <text class="th-coral" x="421" y="540" text-anchor="middle" dominant-baseline="central">Supermemory</text>
  <rect class="coral-inner" x="486" y="516" width="64" height="40" rx="6"/>
  <text class="th-coral" x="518" y="540" text-anchor="middle" dominant-baseline="central">NPPES</text>
  <rect class="coral-inner" x="560" y="516" width="70" height="40" rx="6"/>
  <text class="th-coral" x="595" y="540" text-anchor="middle" dominant-baseline="central">SAMHSA</text>

  <line x1="170" y1="588" x2="170" y2="626" class="arr"/>
  <line x1="500" y1="588" x2="500" y2="626" class="arr"/>

  <rect class="gray-box" x="40" y="634" width="260" height="90" rx="16"/>
  <text class="th-gray" x="170" y="658" text-anchor="middle">Persistence</text>
  <rect class="gray-inner" x="60" y="672" width="110" height="36" rx="6"/>
  <text class="ts-gray" x="115" y="694" text-anchor="middle" dominant-baseline="central">localStorage</text>
  <rect class="gray-inner" x="180" y="672" width="108" height="36" rx="6"/>
  <text class="ts-gray" x="234" y="694" text-anchor="middle" dominant-baseline="central">Firebase Auth</text>

  <rect class="gray-box" x="380" y="634" width="260" height="90" rx="16"/>
  <text class="th-gray" x="510" y="658" text-anchor="middle">Public keys (browser-safe)</text>
  <rect class="gray-inner" x="400" y="672" width="106" height="36" rx="6"/>
  <text class="ts-gray" x="453" y="694" text-anchor="middle" dominant-baseline="central">Firebase config</text>
  <rect class="gray-inner" x="516" y="672" width="112" height="36" rx="6"/>
  <text class="ts-gray" x="572" y="694" text-anchor="middle" dominant-baseline="central">Vapi public key</text>

  <text class="ts" x="340" y="758" text-anchor="middle">Zero secret keys in the browser JS bundle</text>

  <rect class="teal-inner" x="140" y="780" width="130" height="28" rx="14"/>
  <text class="ts-teal" x="205" y="798" text-anchor="middle" dominant-baseline="central">Keys server-side</text>
  <rect class="coral-inner" x="290" y="780" width="120" height="28" rx="14"/>
  <text class="ts-coral" x="350" y="798" text-anchor="middle" dominant-baseline="central">External APIs</text>
  <rect class="gray-inner" x="430" y="780" width="110" height="28" rx="14"/>
  <text class="ts-gray" x="485" y="798" text-anchor="middle" dominant-baseline="central">Persistence</text>
</svg>