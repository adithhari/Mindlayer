<svg width="680" viewBox="0 0 680 840" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff;">
  <style>
    .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
